<!DOCTYPE html>
<html>
<head>
  <title>FactionsVR Live Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial;
    }

    #map {
      z-index: 1;
    }

    /* LOGIN */
    #login-screen {
      position: absolute;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    #login-box {
      background: rgba(20,20,20,0.95);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      color: white;
      width: 260px;
    }

    #login-box input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
    }

    #login-box button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      cursor: pointer;
    }

    #login-error {
      color: #ff4d4d;
      font-size: 12px;
      margin-top: 6px;
    }

    /* SIDEBAR */
    #player-list-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 3000;
      display: flex;
    }

    #player-list {
      width: 340px;
      max-height: 90vh;
      overflow-y: auto;
      background: rgba(20,20,20,0.75);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px;
      color: white;
    }

    #search-box {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      box-sizing: border-box;
    }

    .player-item {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: 0.2s;
    }

    .player-item:hover {
      background: rgba(255,255,255,0.12);
    }

    .follow-btn,
    .tp-btn,
    .home-copy {
      margin-top: 6px;
      margin-right: 5px;
      background: #e74c3c;
      border: none;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .player-name-label {
      background: transparent;
      border: none;
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
    }

    #follow-bar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20,20,20,0.85);
      color: white;
      padding: 10px;
      border-radius: 10px;
      display: none;
      z-index: 4000;
    }

    #follow-name {
      color: #e74c3c;
    }

    #coords {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
      z-index: 3000;
    }

    #copy-toast {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.2s;
      z-index: 5000;
    }

    /* HEATMAP */
    #heatmap-button {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5000;
      background: rgba(0,0,0,0.8);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    #heatmap-panel {
      position: absolute;
      top: 55px;
      right: 10px;
      width: 180px;
      background: rgba(0,0,0,0.92);
      color: white;
      padding: 10px;
      border-radius: 10px;
      display: none;
      z-index: 5000;
    }

    .heat-option {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      cursor: pointer;
    }

    .heat-option:hover {
      background: rgba(255,255,255,0.15);
    }

    #heat-close {
      float: right;
      background: red;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <div id="login-box">
    <h2>FactionsVR Map</h2>

    <input id="password" type="password" placeholder="Enter password"/>

    <button id="login-btn">Enter</button>

    <p id="login-error"></p>
  </div>
</div>

<div id="map"></div>

<div id="follow-bar">
  Following:
  <span id="follow-name"></span>

  <button id="stop-following">
    Stop
  </button>
</div>

<div id="player-list-container">
  <div id="player-list">

    <input id="search-box" placeholder="Search players"/>

    <div id="players-content"></div>

  </div>
</div>

<div id="coords">
  X:0 | Z:0
</div>

<div id="copy-toast">
  Copied!
</div>

<!-- HEAT -->
<button id="heatmap-button">
  Heat Map
</button>

<div id="heatmap-panel">

  <button id="heat-close">
    ✕
  </button>

  <h3>Heat Map</h3>

  <div class="heat-option" data-days="1">
    Last 1 Day
  </div>

  <div class="heat-option" data-days="3">
    Last 3 Days
  </div>

  <div class="heat-option" data-days="7">
    Last 7 Days
  </div>

  <div class="heat-option" id="heat-clear">
    Clear
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const CORRECT_PASSWORD = "6768";

// LOGIN MEMORY
window.addEventListener("load", () => {

  if(localStorage.getItem("factionsvr_logged_in") === "true"){

    document.getElementById("login-screen").style.display = "none";
  }
});

document.getElementById("login-btn").onclick = () => {

  const val = document.getElementById("password").value;

  if(val === CORRECT_PASSWORD){

    localStorage.setItem("factionsvr_logged_in", "true");

    document.getElementById("login-screen").style.display = "none";

  } else {

    document.getElementById("login-error").innerText = "Wrong password";
  }
};

// MAP
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 4
}).setView([0,0],1);

L.tileLayer('https://factionsvr.com/api/map/chunk/{z}/{x}/{y}', {
  tileSize:256,
  noWrap:true,
  maxNativeZoom:4
}).addTo(map);

// STATE
const markers = {};
let followPlayer = null;

let playerHistory =
  JSON.parse(localStorage.getItem("history") || "{}");

function save(){
  localStorage.setItem(
    "history",
    JSON.stringify(playerHistory)
  );
}

// COPY
function copy(text){

  navigator.clipboard.writeText(text);

  const t = document.getElementById("copy-toast");

  t.style.opacity = 1;

  setTimeout(() => {
    t.style.opacity = 0;
  }, 1200);
}

// COORDS
map.on("mousemove", e => {

  document.getElementById("coords").innerText =
    `X:${Math.floor(e.latlng.lng)} | Z:${Math.floor(-e.latlng.lat)}`;
});

// LIKELY TP/HOME DETECTION
function home(hist){

  if(!hist || hist.length < 2) return null;

  const spots = {};

  for(let i = 1; i < hist.length; i++){

    const last = hist[i - 1];
    const cur = hist[i];

    const dist = Math.hypot(
      cur.lng - last.lng,
      cur.lat - last.lat
    );

    // detect teleport jump
    if(dist > 800){

      const x =
        Math.round(cur.lng / 50) * 50;

      const z =
        Math.round(cur.lat / 50) * 50;

      const key = `${x}:${z}`;

      spots[key] =
        (spots[key] || 0) + 1;
    }
  }

  let best = null;
  let max = 0;

  for(const key in spots){

    if(spots[key] > max){

      max = spots[key];
      best = key;
    }
  }

  if(!best) return null;

  const [x, z] =
    best.split(":").map(Number);

  return {
    x,
    z,
    count:max
  };
}

// HEATMAP
let heat = [];

function clearHeat(){

  heat.forEach(h => map.removeLayer(h));

  heat = [];
}

function heatmap(days){

  clearHeat();

  const now = Date.now();
  const maxAge = days * 86400000;

  for(const username in playerHistory){

    playerHistory[username].forEach(pos => {

      if(now - pos.time > maxAge) return;

      const circle = L.circleMarker(
        [pos.lat, pos.lng],
        {
          radius: days === 1 ? 5 :
                  days === 3 ? 8 : 12,

          color: "red",
          fillColor: "red",
          fillOpacity: 0.06,
          stroke: false
        }
      ).addTo(map);

      heat.push(circle);
    });
  }
}

// HEAT UI
document.getElementById("heatmap-button").onclick = () => {

  document.getElementById("heatmap-panel").style.display = "block";
};

document.getElementById("heat-close").onclick = () => {

  document.getElementById("heatmap-panel").style.display = "none";
};

document.getElementById("heat-clear").onclick = () => {

  clearHeat();
};

document.querySelectorAll(".heat-option").forEach(btn => {

  if(btn.dataset.days){

    btn.onclick = () => {

      heatmap(+btn.dataset.days);
    };
  }
});

// FOLLOW
document.getElementById("stop-following").onclick = () => {

  followPlayer = null;

  document.getElementById("follow-bar").style.display = "none";
};

// LOAD PLAYERS
async function load(){

  try {

    const r = await fetch(
      "https://factions-map.onrender.com/players"
    );

    const d = await r.json();

    const list =
      document.getElementById("players-content");

    list.innerHTML = "";

    Object.values(markers).forEach(m => {
      map.removeLayer(m);
    });

    for(const k in markers){
      delete markers[k];
    }

    const search =
      document.getElementById("search-box")
      .value
      .toLowerCase();

    d.players.forEach(p => {

      const u = p.Username;

      if(
        search &&
        !u.toLowerCase().includes(search)
      ) return;

      const [x,y,z] =
        p.Pose.Head.Position;

      const lat = -z;
      const lng = x;

      if(!playerHistory[u])
        playerHistory[u] = [];

      playerHistory[u].push({
        lat,
        lng,
        time: Date.now()
      });

      if(playerHistory[u].length > 500)
        playerHistory[u].shift();

      const marker = L.circleMarker(
        [lat,lng],
        {
          radius: 6,
          color: "red",
          fillColor: "red",
          fillOpacity: 1
        }
      ).addTo(map);

      marker.bindTooltip(
        u,
        {
          permanent:true,
          direction:"top",
          offset:[0,-10],
          className:"player-name-label"
        }
      );

      marker.on("click", () => {

        map.setView([lat,lng],3);
      });

      markers[u] = marker;

      // FOLLOW CAMERA
      if(followPlayer === u){

        map.setView([lat,lng],3);
      }

      // HOME
      const h = home(playerHistory[u]);

      const div = document.createElement("div");

      div.className = "player-item";

      div.innerHTML = `
        <b>${u}</b><br>

        X:${Math.floor(x)}
        Y:${Math.floor(y)}
        Z:${Math.floor(z)}<br><br>

        🏠 ${
          h
          ? `X:${h.x} Z:${-h.z} (${h.count} TPs)
          <button class="home-copy">
            Copy
          </button>`
          : "Unknown"
        }
        <br>

        <button class="follow-btn">
          Follow
        </button>

        <button class="tp-btn">
          TP Coords
        </button>
      `;

      // FOLLOW
      div.querySelector(".follow-btn")
      .onclick = () => {

        followPlayer = u;

        document.getElementById(
          "follow-name"
        ).innerText = u;

        document.getElementById(
          "follow-bar"
        ).style.display = "block";
      };

      // TP COPY
      div.querySelector(".tp-btn")
      .onclick = () => {

        copy(
          `/tp ${Math.floor(x)} ${Math.floor(y)} ${Math.floor(z)}`
        );
      };

      // HOME COPY
      const hc =
        div.querySelector(".home-copy");

      if(hc && h){

        hc.onclick = () => {

          copy(
            `X:${h.x} Z:${-h.z}`
          );
        };
      }

      // CLICK PLAYER
      div.onclick = () => {

        map.setView([lat,lng],3);
      };

      list.appendChild(div);
    });

    save();

  } catch(err){

    console.error(err);
  }
}

// SEARCH LIVE
document.getElementById("search-box")
.addEventListener("input", load);

// REFRESH
setInterval(load, 3000);

load();

</script>

</body>
</html>

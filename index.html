<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactionsVR Live Map</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
  }

  #map {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      linear-gradient(#1b1b1b 1px, transparent 1px),
      linear-gradient(90deg, #1b1b1b 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .player {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: red;
    border: 2px solid white;
    box-shadow: 0 0 10px rgba(255,0,0,0.8);
  }

  .name {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 12px;
    white-space: nowrap;
    text-shadow: 0 0 5px black;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    z-index: 9999;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="status">Loading players...</div>
<div id="map"></div>

<script>
const API_URL = "https://factions-map.onrender.com/players";

const map = document.getElementById("map");
const statusBox = document.getElementById("status");

// scale world coords down
const SCALE = 0.01;

// center map
const CENTER_X = window.innerWidth / 2;
const CENTER_Y = window.innerHeight / 2;

async function loadPlayers() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    map.innerHTML = "";

    if (!data.players) {
      statusBox.innerText = "No players found";
      return;
    }

    statusBox.innerText = `Players Online: ${data.players.length}`;

    data.players.forEach(player => {

      // get world position
      const pos = player.Pose.Head.Position;

      const worldX = pos[0];
      const worldY = pos[1];
      const worldZ = pos[2];

      // convert world coords to screen coords
      const screenX = CENTER_X + (worldX * SCALE);
      const screenY = CENTER_Y - (worldZ * SCALE);

      // create player container
      const playerDiv = document.createElement("div");
      playerDiv.className = "player";

      playerDiv.style.left = screenX + "px";
      playerDiv.style.top = screenY + "px";

      // player dot
      const dot = document.createElement("div");
      dot.className = "dot";

      // username
      const name = document.createElement("div");
      name.className = "name";
      name.innerText = player.Username;

      // tooltip
      playerDiv.title =
`Username: ${player.Username}
X: ${Math.round(worldX)}
Y: ${Math.round(worldY)}
Z: ${Math.round(worldZ)}
Ping: ${Math.round(player.ping)}`;

      playerDiv.appendChild(dot);
      playerDiv.appendChild(name);

      map.appendChild(playerDiv);
    });

  } catch (err) {
    console.error(err);
    statusBox.innerText = "Failed to load API";
  }
}

// first load
loadPlayers();

// auto refresh
setInterval(loadPlayers, 5000);
</script>

</body>
</html>

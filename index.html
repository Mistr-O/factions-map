<!DOCTYPE html>
<html>
<head>
  <title>FactionsVR Player Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
    }

    #map {
      background: black;
    }

    .leaflet-container {
      background: black !important;
    }

    /* SIDEBAR */
    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 340px;
      height: calc(100vh - 20px);
      background: rgba(15,15,15,0.92);
      border-radius: 14px;
      z-index: 5000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    #title {
      padding: 18px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #search {
      margin: 12px;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 14px;
    }

    #players {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .player {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .player:hover {
      background: rgba(255,255,255,0.08);
    }

    .name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .coords {
      font-size: 13px;
      color: #cfcfcf;
      margin-top: 4px;
    }

    .offline {
      opacity: 0.45;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      color: white;
      background: #e53935;
      font-size: 12px;
    }

    button:hover {
      opacity: 0.9;
    }

    #topbar {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5000;
      display: flex;
      gap: 10px;
    }

    #topbar button {
      background: rgba(20,20,20,0.95);
      padding: 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    #coords-box {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 5000;
      background: rgba(15,15,15,0.95);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    #heat-status {
      position: absolute;
      top: 70px;
      right: 10px;
      z-index: 5000;
      color: white;
      background: rgba(20,20,20,0.9);
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .leaflet-tooltip {
      background: transparent !important;
      border: none !important;
      color: white !important;
      font-weight: bold;
      text-shadow: 0 0 5px black;
      box-shadow: none !important;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <div id="title">FactionsVR Tracker</div>

  <input id="search" placeholder="Search players...">

  <div id="players"></div>
</div>

<div id="topbar">
  <button id="toggleHeat">Heat Map</button>
  <button id="resetView">Reset View</button>
</div>

<div id="heat-status">Heat Map Enabled</div>

<div id="coords-box">
  X: 0 | Z: 0
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -10,
  maxZoom: 12,
  zoomSnap: 0.25,
  zoomDelta: 0.25,
  wheelPxPerZoomLevel: 60,
  attributionControl: false
}).setView([0,0], 0);

map.scrollWheelZoom.enable();
map.doubleClickZoom.enable();
map.touchZoom.enable();
map.boxZoom.enable();
map.keyboard.enable();

const markers = {};
const heatLayers = [];
const knownPlayers = JSON.parse(localStorage.getItem("knownPlayers") || "{}");

let heatEnabled = false;

map.on("mousemove", e => {
  document.getElementById("coords-box").innerText =
    `X: ${Math.floor(e.latlng.lng)} | Z: ${Math.floor(-e.latlng.lat)}`;
});

function savePlayers() {
  localStorage.setItem("knownPlayers", JSON.stringify(knownPlayers));
}

function addHeat(lat, lng) {

  if (!heatEnabled) return;

  const heat = L.circleMarker([lat, lng], {
    radius: 25,
    color: "red",
    fillColor: "red",
    fillOpacity: 0.06,
    stroke: false
  }).addTo(map);

  heatLayers.push(heat);
}

function clearHeat() {
  heatLayers.forEach(h => map.removeLayer(h));
  heatLayers.length = 0;
}

document.getElementById("toggleHeat").onclick = () => {

  heatEnabled = !heatEnabled;

  const status = document.getElementById("heat-status");

  if (heatEnabled) {
    status.style.display = "block";

    Object.values(knownPlayers).forEach(p => {
      addHeat(p.lat, p.lng);
    });

  } else {
    status.style.display = "none";
    clearHeat();
  }
};

document.getElementById("resetView").onclick = () => {
  map.setView([0,0], 0);
};

function copy(text) {
  navigator.clipboard.writeText(text);
}

async function load() {

  try {

    const r = await fetch("https://factions-map.onrender.com/players");
    const data = await r.json();

    const online = {};

    data.players.forEach(p => {

      const x = Math.floor(p.Pose.Head.Position[0]);
      const y = Math.floor(p.Pose.Head.Position[1]);
      const z = Math.floor(p.Pose.Head.Position[2]);

      const lat = -z;
      const lng = x;

      online[p.Username] = true;

      knownPlayers[p.Username] = {
        x,y,z,lat,lng,online:true
      };

      addHeat(lat, lng);

      if (!markers[p.Username]) {

        markers[p.Username] = L.circleMarker([lat,lng], {
          radius: 6,
          color: "red",
          fillColor: "red",
          fillOpacity: 1
        }).addTo(map);

        markers[p.Username].bindTooltip(p.Username, {
          permanent: true,
          direction: "top"
        });

      } else {

        markers[p.Username].setLatLng([lat,lng]);
      }
    });

    Object.keys(knownPlayers).forEach(name => {
      if (!online[name]) {
        knownPlayers[name].online = false;
      }
    });

    renderPlayers();

    savePlayers();

  } catch(err) {
    console.log(err);
  }
}

function renderPlayers() {

  const wrap = document.getElementById("players");
  const search = document.getElementById("search").value.toLowerCase();

  wrap.innerHTML = "";

  const sorted = Object.entries(knownPlayers)
    .sort((a,b)=>b[1].online-a[1].online);

  sorted.forEach(([name,p]) => {

    if (!name.toLowerCase().includes(search)) return;

    const div = document.createElement("div");

    div.className = "player";

    if (!p.online) div.classList.add("offline");

    div.innerHTML = `
      <div class="name">
        ${name}
        ${p.online ? "🟢" : "⚫"}
      </div>

      <div class="coords">
        X: ${p.x}
      </div>

      <div class="coords">
        Y: ${p.y}
      </div>

      <div class="coords">
        Z: ${p.z}
      </div>

      <div class="buttons">
        <button class="tp">Copy TP</button>
        <button class="view">View</button>
      </div>
    `;

    div.querySelector(".tp").onclick = () => {
      copy(`${p.x} ${p.y} ${p.z}`);
    };

    div.querySelector(".view").onclick = () => {
      map.setView([p.lat,p.lng], 4);
    };

    wrap.appendChild(div);
  });
}

document.getElementById("search").oninput = renderPlayers;

setInterval(load, 3000);

load();

</script>

</body>
</html>

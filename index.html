<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactionsVR Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

.player-label {
  background: transparent;
  border: none;
  box-shadow: none;
  color: white;
  font-size: 12px;
  font-weight: bold;
  text-shadow: 0 0 5px black;
}

#topbar {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 99999;
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
}

</style>
</head>

<body>

<div id="topbar">
  Players Online:
  <span id="count">0</span>
</div>

<div id="map"></div>

<script>

const API =
  "https://factions-map.onrender.com/players";

const SCALE = 0.01;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 5,
  zoomControl: true
}).setView([0, 0], 0);

const markers = {};

async function loadPlayers() {

  try {

    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("count").innerText =
      data.players.length;

    const currentUsers = new Set();

    data.players.forEach(player => {

      const username = player.Username;

      currentUsers.add(username);

      const pos = player.Pose.Head.Position;

      const x = pos[0] * SCALE;
      const z = pos[2] * SCALE;

      const latlng = [z, x];

      // CREATE NEW MARKER
      if (!markers[username]) {

        const marker = L.circleMarker(
          latlng,
          {
            radius: 6,
            color: "#ff3b3b",
            fillColor: "#ff3b3b",
            fillOpacity: 1
          }
        ).addTo(map);

        marker.bindTooltip(
          username,
          {
            permanent: true,
            direction: "top",
            className: "player-label",
            offset: [0, -8]
          }
        );

        markers[username] = marker;

      } else {

        // MOVE EXISTING MARKER
        markers[username].setLatLng(latlng);

      }

    });

    // REMOVE OFFLINE PLAYERS
    for (const username in markers) {

      if (!currentUsers.has(username)) {

        map.removeLayer(markers[username]);

        delete markers[username];

      }

    }

  } catch (err) {

    console.error(err);

  }

}

loadPlayers();

setInterval(loadPlayers, 3000);

</script>

</body>
</html>

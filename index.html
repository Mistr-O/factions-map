<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactionsVR Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
}

#map {
  position: absolute;
  left: 260px;
  top: 0;
  width: calc(100% - 260px);
  height: 100%;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
}

#sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  border-right: 1px solid #222;
  overflow-y: auto;
  color: white;
  z-index: 99999;
}

#sidebar h2 {
  margin: 0;
  padding: 15px;
  background: #161616;
  border-bottom: 1px solid #222;
  font-size: 18px;
}

.player-entry {
  padding: 10px;
  border-bottom: 1px solid #222;
  cursor: pointer;
}

.player-entry:hover {
  background: #1d1d1d;
}

.player-name {
  font-weight: bold;
  font-size: 14px;
  color: white;
}

.player-coords {
  font-size: 12px;
  color: #aaa;
  margin-top: 4px;
}

.player-label {
  background: transparent;
  border: none;
  box-shadow: none;
  color: white;
  font-size: 12px;
  font-weight: bold;
  text-shadow: 0 0 5px black;
}

#topbar {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 99999;
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 14px;
}

</style>
</head>

<body>

<div id="sidebar">
  <h2>Players</h2>
  <div id="playerList"></div>
</div>

<div id="topbar">
  Online:
  <span id="count">0</span>
</div>

<div id="map"></div>

<script>

const API =
  "https://factions-map.onrender.com/players";

const SCALE = 0.01;

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 5,
  zoomControl: true
}).setView([0, 0], 0);

const markers = {};

async function loadPlayers() {

  try {

    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("count").innerText =
      data.players.length;

    const playerList =
      document.getElementById("playerList");

    playerList.innerHTML = "";

    const currentUsers = new Set();

    data.players.forEach(player => {

      const username = player.Username;

      currentUsers.add(username);

      const pos = player.Pose.Head.Position;

      const worldX = Math.round(pos[0]);
      const worldY = Math.round(pos[1]);
      const worldZ = Math.round(pos[2]);

      const x = pos[0] * SCALE;
      const z = pos[2] * SCALE;

      const latlng = [z, x];

      // PLAYER LIST ENTRY
      const entry = document.createElement("div");

      entry.className = "player-entry";

      entry.innerHTML = `
        <div class="player-name">
          ${username}
        </div>

        <div class="player-coords">
          X: ${worldX}<br>
          Y: ${worldY}<br>
          Z: ${worldZ}
        </div>
      `;

      entry.onclick = () => {
        map.setView(latlng, 2);
      };

      playerList.appendChild(entry);

      // CREATE NEW MARKER
      if (!markers[username]) {

        const marker = L.circleMarker(
          latlng,
          {
            radius: 6,
            color: "#ff3b3b",
            fillColor: "#ff3b3b",
            fillOpacity: 1
          }
        ).addTo(map);

        marker.bindTooltip(
          `
          <div>
            ${username}<br>
            X: ${worldX}<br>
            Y: ${worldY}<br>
            Z: ${worldZ}
          </div>
          `,
          {
            permanent: true,
            direction: "top",
            className: "player-label",
            offset: [0, -8]
          }
        );

        marker.bindPopup(`
          <b>${username}</b><br><br>

          X: ${worldX}<br>
          Y: ${worldY}<br>
          Z: ${worldZ}<br><br>

          Ping:
          ${Math.round(player.ping)}
        `);

        markers[username] = marker;

      } else {

        markers[username].setLatLng(latlng);

      }

    });

    // REMOVE OFFLINE PLAYERS
    for (const username in markers) {

      if (!currentUsers.has(username)) {

        map.removeLayer(markers[username]);

        delete markers[username];

      }

    }

  } catch (err) {

    console.error(err);

  }

}

loadPlayers();

setInterval(loadPlayers, 3000);

</script>

</body>
</html>

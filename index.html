<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FactionsVR Tracker</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,
body,
#map{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,Helvetica,sans-serif;
}

.leaflet-container{
  background:#000 !important;
}

#sidebar{
  position:absolute;
  left:14px;
  top:14px;
  width:360px;
  height:calc(100vh - 28px);
  background:rgba(8,8,8,.92);
  border-radius:18px;
  z-index:9999;
  color:white;
  overflow:hidden;
}
  #players{
  height:calc(100vh - 180px);
  overflow-y:auto;
}

.player{
  background:#111;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.playerTop{
  display:flex;
  justify-content:space-between;
}

.coords{
  margin-top:8px;
  color:#aaa;
}

.home{
  margin-top:8px;
  color:#ff7676;
}

.buttons{
  display:flex;
  gap:8px;
  margin-top:10px;
}

#header{
  padding:20px;
}

#title{
  font-size:26px;
  font-weight:700;
}

#subtitle{
  color:#888;
}

#searchWrap{
  padding:14px;
}

#search{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
}

#players{
  padding:14px;
  overflow-y:auto;
  height:80%;
}

.player{
  background:#111;
  padding:14px;
  border-radius:12px;
  margin-bottom:10px;
}

.playerName{
  color:white;
  font-weight:bold;
}

.onlineStatus{
  color:#5cff84;
}

.offlineStatus{
  color:#999;
}

button{
  border:none;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  color:white;
  background:#d63031;
}

.secondary{
  background:#222;
}

#topbar{
  position:absolute;
  top:14px;
  right:14px;
  z-index:9999;
}

#coordsBox{
  position:absolute;
  right:14px;
  bottom:14px;
  background:#111;
  color:white;
  padding:12px;
  border-radius:12px;
  z-index:9999;
}

</style>

</head>
<body>


<div id="map"></div>

<div id="sidebar">

  <div id="header">
    <div id="title">FactionsVR</div>
    <div id="subtitle">
      Live Player Tracker
    </div>
  </div>

  <div id="searchWrap">
    <input id="search" placeholder="Search players...">
  </div>

  <div id="players"></div>

</div>

<div id="topbar">

  <button id="heatBtn">
    Heat Map
  </button>

  <button id="resetBtn" class="secondary">
    Reset View
  </button>

</div>

<div id="coordsBox">
  X: 0 | Z: 0
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>


<script>
/* =========================
   MAP
========================= */

const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -10,
  maxZoom: 12,
  zoomSnap: 0.25,
  zoomDelta: 0.25,
  attributionControl: false
}).setView([0, 0], 0);

/* =========================
   GRID
========================= */

const gridLayer = L.layerGroup().addTo(map);

function drawGrid() {

  gridLayer.clearLayers();

  const zoom = map.getZoom();

  let size = 100;

  if (zoom <= -2) size = 500;
  if (zoom <= -4) size = 1000;
  if (zoom <= -6) size = 2500;
  if (zoom <= -8) size = 5000;

  const bounds = map.getBounds();

  const minX = Math.floor(bounds.getWest() / size) * size;
  const maxX = Math.ceil(bounds.getEast() / size) * size;

  const minY = Math.floor(bounds.getSouth() / size) * size;
  const maxY = Math.ceil(bounds.getNorth() / size) * size;

  for (let x = minX; x <= maxX; x += size) {

    L.polyline(
      [
        [minY, x],
        [maxY, x]
      ],
      {
        color: "rgba(255,255,255,.08)",
        weight: 1,
        interactive: false
      }
    ).addTo(gridLayer);
  }

  for (let y = minY; y <= maxY; y += size) {

    L.polyline(
      [
        [y, minX],
        [y, maxX]
      ],
      {
        color: "rgba(255,255,255,.08)",
        weight: 1,
        interactive: false
      }
    ).addTo(gridLayer);
  }
}

map.on("zoom move", drawGrid);
drawGrid();

/* =========================
   STORAGE
========================= */

const knownPlayers =
  JSON.parse(localStorage.getItem("knownPlayers") || "{}");

function savePlayers() {

  localStorage.setItem(
    "knownPlayers",
    JSON.stringify(knownPlayers)
  );
}

/* =========================
   DATA
========================= */

const markers = {};
const locationData = {};
const hotspotMarkers = [];

let heatEnabled = false;

/* =========================
   HELPERS
========================= */

function copy(text) {

  navigator.clipboard.writeText(text);
}

function updateCoordsBox(latlng) {

  document.getElementById("coordsBox").innerText =
    `X: ${Math.floor(latlng.lng)} | Z: ${Math.floor(-latlng.lat)}`;
}

map.on("mousemove", e => {
  updateCoordsBox(e.latlng);
});

/* =========================
   HOME DETECTION
========================= */

function getLikelyHome(history) {

  if (!history || history.length < 5)
    return null;

  const teleports = {};

  for (let i = 1; i < history.length; i++) {

    const prev = history[i - 1];
    const curr = history[i];

    const distance = Math.hypot(
      curr.lng - prev.lng,
      curr.lat - prev.lat
    );

    if (distance < 500)
      continue;

    const x = Math.round(curr.lng / 50) * 50;
    const z = Math.round(curr.lat / 50) * 50;

    const key = `${x}:${z}`;

    teleports[key] =
      (teleports[key] || 0) + 1;
  }

  let bestKey = null;
  let bestCount = 0;

  for (const key in teleports) {

    if (teleports[key] > bestCount) {

      bestCount = teleports[key];
      bestKey = key;
    }
  }

  if (!bestKey)
    return null;

  const [x, z] =
    bestKey.split(":").map(Number);

  return {
    x,
    z: -z,
    teleports: bestCount
  };
}

/* =========================
   HEAT INSPECTOR
========================= */

function clearHotspots() {

  hotspotMarkers.forEach(marker => {
    map.removeLayer(marker);
  });

  hotspotMarkers.length = 0;
}

function buildHeatInspector() {

  clearHotspots();

  Object.entries(locationData)
    .forEach(([key, players]) => {

      const [x, z] =
        key.split(":").map(Number);

      const marker =
        L.circleMarker(
          [-z, x],
          {
            radius: 12,
            color: "red",
            fillColor: "red",
            fillOpacity: 0.5
          }
        ).addTo(map);

      marker.on("click", () => {

        let html =
          "<h3>Players Here</h3>";

        Object.entries(players)
          .forEach(([name, info]) => {

            const avgY =
              Math.round(
                info.yValues.reduce(
                  (a, b) => a + b,
                  0
                ) /
                info.yValues.length
              );

            const mins =
              Math.round(
                (info.lastSeen -
                  info.firstSeen) /
                60000
              );

            html += `
              <b>${name}</b><br>
              Avg Y: ${avgY}<br>
              Time Here: ${mins} min<br><br>
            `;
          });

        L.popup()
          .setLatLng([-z, x])
          .setContent(html)
          .openOn(map);
      });

      hotspotMarkers.push(marker);
    });
}

/* =========================
   BUTTONS
========================= */

document.getElementById("heatBtn")
  .onclick = () => {

    heatEnabled = !heatEnabled;

    if (heatEnabled) {
      buildHeatInspector();
    } else {
      clearHotspots();
    }
  };

document.getElementById("resetBtn")
  .onclick = () => {

    map.setView([0, 0], 0);
  };

/* =========================
   PLAYER FETCH
========================= */

async function loadPlayers() {

  try {

    const response =
      await fetch(
        "https://factions-map.onrender.com/players"
      );

    const data =
      await response.json();

    const online = {};

    data.players.forEach(playerData => {

      const x =
        Math.floor(
          playerData.Pose.Head.Position[0]
        );

      const y =
        Math.floor(
          playerData.Pose.Head.Position[1]
        );

      const z =
        Math.floor(
          playerData.Pose.Head.Position[2]
        );

      const lat = -z;
      const lng = x;

      online[playerData.Username] = true;

      if (!knownPlayers[playerData.Username]) {

        knownPlayers[playerData.Username] = {
          history: []
        };
      }

      const player =
        knownPlayers[playerData.Username];

      player.x = x;
      player.y = y;
      player.z = z;
      player.lat = lat;
      player.lng = lng;
      player.online = true;

      player.history.push({
        lat,
        lng,
        y,
        time: Date.now()
      });

      if (player.history.length > 5000) {
        player.history.shift();
      }

      const cell = 250;

      const gx =
        Math.round(x / cell) * cell;

      const gz =
        Math.round(z / cell) * cell;

      const key =
        `${gx}:${gz}`;

      if (!locationData[key]) {
        locationData[key] = {};
      }

      if (!locationData[key][playerData.Username]) {

        locationData[key][playerData.Username] = {
          firstSeen: Date.now(),
          lastSeen: Date.now(),
          yValues: []
        };
      }

      locationData[key][playerData.Username]
        .lastSeen = Date.now();

      locationData[key][playerData.Username]
        .yValues.push(y);

      if (!markers[playerData.Username]) {

        markers[playerData.Username] =
          L.circleMarker(
            [lat, lng],
            {
              radius: 6,
              color: "#ff3b3b",
              fillColor: "#ff3b3b",
              fillOpacity: 1
            }
          ).addTo(map);

        markers[playerData.Username]
          .bindTooltip(
            playerData.Username,
            {
              permanent: true,
              direction: "top"
            }
          );

      } else {

        markers[playerData.Username]
          .setLatLng([lat, lng]);
      }
    });

    Object.keys(knownPlayers)
      .forEach(name => {

        if (!online[name]) {
          knownPlayers[name].online = false;
        }
      });

    renderPlayers();
    savePlayers();

    if (heatEnabled) {
      buildHeatInspector();
    }

  } catch (err) {

    console.error(
      "LOAD PLAYERS ERROR:",
      err
    );
  }
}

/* =========================
   PLAYER LIST
========================= */

function renderPlayers() {

  const container =
    document.getElementById("players");

  const search =
    document.getElementById("search")
      .value
      .toLowerCase();

  container.innerHTML = "";

  const players =
    Object.entries(knownPlayers)
      .sort(
        (a, b) =>
          b[1].online - a[1].online
      );

  players.forEach(([name, player]) => {

    if (
      !name.toLowerCase()
        .includes(search)
    ) {
      return;
    }

    const home =
      getLikelyHome(player.history);

    const div =
      document.createElement("div");

    div.className = "player";

    div.innerHTML = `
      <div class="playerTop">
        <div class="playerName">
          ${name}
        </div>

        <div class="${
          player.online
            ? "onlineStatus"
            : "offlineStatus"
        }">
          ${
            player.online
              ? "ONLINE"
              : "OFFLINE"
          }
        </div>
      </div>

      <div class="coords">
        X: ${player.x ?? "?"}<br>
        Y: ${player.y ?? "?"}<br>
        Z: ${player.z ?? "?"}
      </div>

      <div class="home">
        ${
          home
            ? `Home X:${home.x} Z:${home.z}<br>Teleports:${home.teleports}`
            : "Unknown"
        }
      </div>

      <div class="buttons">
        <button class="tp">Copy TP</button>
        <button class="homeBtn">Copy Home</button>
        <button class="secondary view">View</button>
      </div>
    `;

    div.querySelector(".tp")
      .onclick = () => {

        copy(
          `${player.x} ${player.y} ${player.z}`
        );
      };

    div.querySelector(".homeBtn")
      .onclick = () => {

        if (!home) return;

        copy(
          `${home.x} ${home.z}`
        );
      };

    div.querySelector(".view")
      .onclick = () => {

        if (
          player.lat === undefined ||
          player.lng === undefined
        ) {
          return;
        }

        map.setView(
          [player.lat, player.lng],
          4
        );
      };

    container.appendChild(div);
  });
}

/* =========================
   SEARCH
========================= */

document.getElementById("search")
  .addEventListener(
    "input",
    renderPlayers
  );

/* =========================
   START
========================= */

loadPlayers();

setInterval(
  loadPlayers,
  3000
);
</script>

</body>
</html>

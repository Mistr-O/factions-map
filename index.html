<!DOCTYPE html>
<html>
<head>
  <title>Factions Map</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }

    #map {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #1a1a1a;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      position: absolute;
      transform: translate(-50%, -50%);
    }

    .label {
      position: absolute;
      color: white;
      font-size: 10px;
      transform: translate(-50%, -120%);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const API_URL = "https://factions-map.onrender.com/players";
    const map = document.getElementById("map");

    // store markers so we can refresh them
    let markers = {};

    async function loadPlayers() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const players = data.players;

        // clear old markers
        map.innerHTML = "";
        markers = {};

        players.forEach(p => {
          const pos = p.Pose.Head.Position;

          const x = pos[0];
          const z = pos[2];

          // SCALE (adjust if needed)
          const scale = 0.01;

          const px = x * scale;
          const pz = z * scale;

          // DOT
          const dot = document.createElement("div");
          dot.className = "player-dot";
          dot.style.left = px + "px";
          dot.style.top = pz + "px";

          // LABEL
          const label = document.createElement("div");
          label.className = "label";
          label.style.left = px + "px";
          label.style.top = pz + "px";
          label.innerText = p.Username;

          map.appendChild(dot);
          map.appendChild(label);

          markers[p.id] = { dot, label };
        });

      } catch (err) {
        console.error("Failed to load players:", err);
      }
    }

    // initial load
    loadPlayers();

    // refresh every 5 seconds
    setInterval(loadPlayers, 5000);
  </script>
</body>
</html>

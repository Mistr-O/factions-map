<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactionsVR Live Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
  }

  #map {
    width: 100%;
    height: 100%;
    background: #181818;
  }

  .player-label {
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 12px;
    box-shadow: none;
  }

  #status {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="status">Loading...</div>
<div id="map"></div>

<script>
const API_URL = "https://factions-map.onrender.com/players";

// IMPORTANT
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -5,
  maxZoom: 5
}).setView([0, 0], 0);

// background grid
function createGrid() {
  for (let x = -50000; x <= 50000; x += 1000) {
    L.polyline([
      [-50000, x],
      [50000, x]
    ], {
      color: "#222",
      weight: 1
    }).addTo(map);
  }

  for (let y = -50000; y <= 50000; y += 1000) {
    L.polyline([
      [y, -50000],
      [y, 50000]
    ], {
      color: "#222",
      weight: 1
    }).addTo(map);
  }
}

createGrid();

const statusBox = document.getElementById("status");

let markers = [];

// scale world coords
const SCALE = 0.01;

async function loadPlayers() {

  try {

    const res = await fetch(API_URL);
    const data = await res.json();

    // remove old markers
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if (!data.players) {
      statusBox.innerText = "No players";
      return;
    }

    statusBox.innerText =
      "Players Online: " + data.players.length;

    data.players.forEach(player => {

      const pos = player.Pose.Head.Position;

      const worldX = pos[0];
      const worldY = pos[1];
      const worldZ = pos[2];

      // convert coords
      const mapX = worldX * SCALE;
      const mapY = worldZ * SCALE;

      // marker
      const marker = L.circleMarker(
        [mapY, mapX],
        {
          radius: 6,
          color: "red",
          fillColor: "red",
          fillOpacity: 1
        }
      ).addTo(map);

      // username label
      marker.bindTooltip(
        player.Username,
        {
          permanent: true,
          direction: "top",
          className: "player-label"
        }
      );

      // popup
      marker.bindPopup(`
        <b>${player.Username}</b><br>
        X: ${Math.round(worldX)}<br>
        Y: ${Math.round(worldY)}<br>
        Z: ${Math.round(worldZ)}<br>
        Ping: ${Math.round(player.ping)}
      `);

      markers.push(marker);

    });

  } catch (err) {

    console.error(err);

    statusBox.innerText =
      "Failed to load players";

  }

}

// load first time
loadPlayers();

// refresh
setInterval(loadPlayers, 5000);

</script>

</body>
</html>

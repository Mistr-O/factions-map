<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FactionsVR Live Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

html,
body,
#map{
  width:100%;
  height:100%;
  margin:0;
  padding:0;
  overflow:hidden;
  background:#050505;
  font-family:Arial,Helvetica,sans-serif;
}

/* MAP */

#map{
  z-index:1;
  background:#000;
}

/* LOGIN */

#login-screen{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top,#1d0000,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#login-box{
  width:300px;
  padding:25px;
  border-radius:18px;
  background:rgba(15,15,15,.95);
  backdrop-filter:blur(15px);
  box-shadow:
    0 0 40px rgba(255,0,0,.18);
  color:white;
  text-align:center;
}

#login-box h1{
  margin:0 0 18px;
  color:#ff3c3c;
  font-size:30px;
}

#login-box input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:10px;
  background:#111;
  color:white;
  box-sizing:border-box;
  font-size:15px;
}

#login-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#e53935;
  color:white;
  cursor:pointer;
  font-size:15px;
  transition:.2s;
}

#login-box button:hover{
  background:#ff4d4d;
}

#login-error{
  color:#ff4d4d;
  font-size:12px;
  margin-top:8px;
}

/* SIDEBAR */

#sidebar{
  position:absolute;
  top:12px;
  left:12px;
  width:360px;
  max-height:94vh;
  z-index:4000;

  background:
    rgba(12,12,12,.72);

  backdrop-filter:blur(14px);

  border-radius:18px;

  overflow:hidden;

  box-shadow:
    0 0 25px rgba(0,0,0,.45);
}

#sidebar-header{
  padding:14px;
  border-bottom:
    1px solid rgba(255,255,255,.08);
}

#title{
  color:white;
  font-size:22px;
  font-weight:bold;
}

#online-count{
  color:#ff5757;
  font-size:13px;
  margin-top:3px;
}

#search{
  width:100%;
  margin-top:10px;
  padding:11px;
  border:none;
  outline:none;
  border-radius:10px;
  box-sizing:border-box;
  background:#111;
  color:white;
  font-size:14px;
}

#players{
  max-height:74vh;
  overflow-y:auto;
  padding:10px;
}

/* PLAYER */

.player{
  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.05);

  border-radius:14px;

  padding:12px;

  margin-bottom:10px;

  transition:.2s;
}

.player:hover{
  background:
    rgba(255,255,255,.08);
}

.player-name{
  color:white;
  font-size:17px;
  font-weight:bold;
}

.coords{
  color:#cfcfcf;
  margin-top:6px;
  font-size:13px;
}

.home{
  margin-top:8px;
  color:#ff8a8a;
  font-size:13px;
}

.buttons{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.btn{
  flex:1;
  border:none;
  border-radius:9px;
  padding:8px;
  cursor:pointer;
  color:white;
  font-size:12px;
  transition:.2s;
}

.follow{
  background:#e53935;
}

.follow:hover{
  background:#ff4d4d;
}

.copy{
  background:#1e88e5;
}

.copy:hover{
  background:#42a5f5;
}

/* FOLLOW BAR */

#follow-bar{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(15,15,15,.92);
  color:white;
  padding:12px 18px;
  border-radius:12px;
  display:none;
  align-items:center;
  gap:12px;
  z-index:5000;
  backdrop-filter:blur(12px);
}

#follow-name{
  color:#ff5b5b;
  font-weight:bold;
}

#stop-follow{
  background:red;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* COORDS */

#mouse-coords{
  position:absolute;
  bottom:12px;
  left:12px;

  background:
    rgba(15,15,15,.85);

  color:white;

  padding:8px 12px;

  border-radius:12px;

  z-index:4000;

  font-size:13px;
}

/* TOAST */

#toast{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);

  background:
    rgba(15,15,15,.95);

  color:white;

  padding:10px 16px;

  border-radius:10px;

  opacity:0;

  transition:.25s;

  z-index:9999;
}

/* HEATMAP */

#heat-btn{
  position:absolute;
  top:12px;
  right:12px;

  border:none;
  background:
    rgba(15,15,15,.9);

  color:white;

  padding:12px;

  border-radius:12px;

  cursor:pointer;

  z-index:5000;
}

#heat-panel{
  position:absolute;
  top:60px;
  right:12px;

  width:190px;

  background:
    rgba(15,15,15,.94);

  border-radius:14px;

  padding:12px;

  display:none;

  z-index:5000;

  backdrop-filter:blur(12px);
}

.heat-option{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:
    rgba(255,255,255,.06);

  color:white;

  transition:.2s;
}

.heat-option:hover{
  background:
    rgba(255,255,255,.12);
}

/* PLAYER LABEL */

.player-label{
  background:transparent;
  border:none;
  color:white;
  font-size:12px;
  font-weight:bold;
  text-shadow:
    0 0 6px black,
    0 0 6px black;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#444;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

  <div id="login-box">

    <h1>FactionsVR</h1>

    <input
      id="password"
      type="password"
      placeholder="Enter password"
    />

    <button id="login-btn">
      Enter Map
    </button>

    <div id="login-error"></div>

  </div>

</div>

<!-- MAP -->

<div id="map"></div>

<!-- SIDEBAR -->

<div id="sidebar">

  <div id="sidebar-header">

    <div id="title">
      FactionsVR Live Map
    </div>

    <div id="online-count">
      Loading...
    </div>

    <input
      id="search"
      placeholder="Search players..."
    />

  </div>

  <div id="players"></div>

</div>

<!-- FOLLOW -->

<div id="follow-bar">

  Following:
  <span id="follow-name"></span>

  <button id="stop-follow">
    Stop
  </button>

</div>

<!-- COORDS -->

<div id="mouse-coords">
  X:0 | Z:0
</div>

<!-- TOAST -->

<div id="toast">
  Copied!
</div>

<!-- HEAT -->

<button id="heat-btn">
  Heat Map
</button>

<div id="heat-panel">

  <div
    class="heat-option"
    data-days="1"
  >
    Last 1 Day
  </div>

  <div
    class="heat-option"
    data-days="3"
  >
    Last 3 Days
  </div>

  <div
    class="heat-option"
    data-days="7"
  >
    Last 7 Days
  </div>

  <div
    class="heat-option"
    id="clear-heat"
  >
    Clear Heatmap
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// PASSWORD

const PASSWORD = "6768";

// LOGIN MEMORY

window.addEventListener("load",()=>{

  if(
    localStorage.getItem(
      "factions_logged_in"
    ) === "true"
  ){
    document.getElementById(
      "login-screen"
    ).style.display = "none";
  }
});

document.getElementById(
  "login-btn"
).onclick = ()=>{

  const val =
    document.getElementById(
      "password"
    ).value;

  if(val === PASSWORD){

    localStorage.setItem(
      "factions_logged_in",
      "true"
    );

    document.getElementById(
      "login-screen"
    ).style.display = "none";

  }else{

    document.getElementById(
      "login-error"
    ).innerText = "Wrong password";
  }
};

// MAP

const map = L.map("map",{
  crs:L.CRS.Simple,
  minZoom:-2,
  maxZoom:4
}).setView([0,0],1);

L.tileLayer(
  "https://factionsvr.com/api/map/chunk/{z}/{x}/{y}",
  {
    tileSize:256,
    noWrap:true,
    maxNativeZoom:4
  }
).addTo(map);

// STATE

const markers = {};

let following = null;

let heatLayers = [];

let history =
  JSON.parse(
    localStorage.getItem("history")
    || "{}"
  );

// SAVE HISTORY

function save(){

  localStorage.setItem(
    "history",
    JSON.stringify(history)
  );
}

// TOAST

function toast(msg){

  const t =
    document.getElementById("toast");

  t.innerText = msg;

  t.style.opacity = 1;

  setTimeout(()=>{
    t.style.opacity = 0;
  },1300);
}

// COPY

function copy(text){

  navigator.clipboard.writeText(text);

  toast("Copied!");
}

// COORDS

map.on("mousemove",e=>{

  document.getElementById(
    "mouse-coords"
  ).innerText =
    `X:${Math.floor(e.latlng.lng)} | Z:${Math.floor(-e.latlng.lat)}`;
});

// HOME DETECTION

function likelyHome(hist){

  if(!hist || hist.length < 2)
    return null;

  const spots = {};

  for(let i=1;i<hist.length;i++){

    const a = hist[i-1];
    const b = hist[i];

    const dist = Math.hypot(
      b.lng-a.lng,
      b.lat-a.lat
    );

    // TP DETECT

    if(dist > 800){

      const x =
        Math.round(b.lng/50)*50;

      const z =
        Math.round(b.lat/50)*50;

      const key = `${x}:${z}`;

      spots[key] =
        (spots[key]||0)+1;
    }
  }

  let best = null;
  let max = 0;

  for(const k in spots){

    if(spots[k] > max){

      max = spots[k];

      best = k;
    }
  }

  if(!best) return null;

  const [x,z] =
    best.split(":").map(Number);

  return {
    x,
    z,
    count:max
  };
}

// HEATMAP

function clearHeat(){

  heatLayers.forEach(h=>{
    map.removeLayer(h);
  });

  heatLayers = [];
}

function drawHeat(days){

  clearHeat();

  const now = Date.now();

  const max =
    days * 86400000;

  for(const user in history){

    history[user].forEach(pos=>{

      if(now - pos.time > max)
        return;

      const c =
        L.circleMarker(
          [pos.lat,pos.lng],
          {
            radius:
              days===1 ? 5 :
              days===3 ? 8 : 12,

            color:"red",
            fillColor:"red",
            fillOpacity:.05,
            stroke:false
          }
        ).addTo(map);

      heatLayers.push(c);
    });
  }
}

// HEAT UI

let heatOpen = false;

document.getElementById(
  "heat-btn"
).onclick = ()=>{

  heatOpen = !heatOpen;

  document.getElementById(
    "heat-panel"
  ).style.display =
    heatOpen
    ? "block"
    : "none";

  if(!heatOpen)
    clearHeat();
};

document.querySelectorAll(
  ".heat-option"
).forEach(btn=>{

  if(btn.dataset.days){

    btn.onclick = ()=>{

      drawHeat(
        +btn.dataset.days
      );
    };
  }
});

document.getElementById(
  "clear-heat"
).onclick = ()=>{

  clearHeat();
};

// FOLLOW

document.getElementById(
  "stop-follow"
).onclick = ()=>{

  following = null;

  document.getElementById(
    "follow-bar"
  ).style.display = "none";
};

// LOAD PLAYERS

async function load(){

  try{

    const r =
      await fetch(
        "https://factions-map.onrender.com/players"
      );

    const data =
      await r.json();

    const players =
      document.getElementById(
        "players"
      );

    players.innerHTML = "";

    document.getElementById(
      "online-count"
    ).innerText =
      `${data.count} Players Online`;

    Object.values(markers)
    .forEach(m=>{
      map.removeLayer(m);
    });

    for(const k in markers)
      delete markers[k];

    const search =
      document.getElementById(
        "search"
      ).value
      .toLowerCase();

    data.players.forEach(p=>{

      const name = p.Username;

      if(
        search &&
        !name.toLowerCase()
        .includes(search)
      ) return;

      const [x,y,z] =
        p.Pose.Head.Position;

      const lat = -z;
      const lng = x;

      // HISTORY

      if(!history[name])
        history[name] = [];

      history[name].push({
        lat,
        lng,
        time:Date.now()
      });

      if(
        history[name].length > 500
      ){
        history[name].shift();
      }

      // MARKER

      const marker =
        L.circleMarker(
          [lat,lng],
          {
            radius:6,
            color:"#ff3b3b",
            fillColor:"#ff3b3b",
            fillOpacity:1
          }
        ).addTo(map);

      marker.bindTooltip(
        name,
        {
          permanent:true,
          direction:"top",
          offset:[0,-10],
          className:"player-label"
        }
      );

      marker.on("click",()=>{

        map.setView(
          [lat,lng],
          3
        );
      });

      markers[name] = marker;

      // FOLLOW

      if(following === name){

        map.setView(
          [lat,lng],
          3
        );
      }

      // HOME

      const home =
        likelyHome(
          history[name]
        );

      // UI

      const div =
        document.createElement("div");

      div.className = "player";

      div.innerHTML = `

        <div class="player-name">
          ${name}
        </div>

        <div class="coords">
          X:${Math.floor(x)}
          Y:${Math.floor(y)}
          Z:${Math.floor(z)}
        </div>

        <div class="home">
          🏠
          ${
            home
            ?
            `
            X:${home.x}
            Z:${-home.z}
            (${home.count} TPs)
            `
            :
            "Unknown"
          }
        </div>

        <div class="buttons">

          <button
            class="btn follow"
          >
            Follow
          </button>

          <button
            class="btn copy"
          >
            Copy TP
          </button>

        </div>
      `;

      // FOLLOW BTN

      div.querySelector(
        ".follow"
      ).onclick = ()=>{

        following = name;

        document.getElementById(
          "follow-name"
        ).innerText = name;

        document.getElementById(
          "follow-bar"
        ).style.display = "flex";
      };

      // COPY BTN

      div.querySelector(
        ".copy"
      ).onclick = ()=>{

        copy(
          `/tp ${Math.floor(x)} ${Math.floor(y)} ${Math.floor(z)}`
        );
      };

      // CLICK PLAYER

      div.onclick = ()=>{

        map.setView(
          [lat,lng],
          3
        );
      };

      players.appendChild(div);

    });

    save();

  }catch(err){

    console.error(err);
  }
}

// SEARCH

document.getElementById(
  "search"
).addEventListener(
  "input",
  load
);

// REFRESH

setInterval(load,3000);

load();

</script>
</body>
</html>

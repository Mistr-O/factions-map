<!DOCTYPE html>
<html>
<head>
  <title>FactionsVR Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>

    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
    }

    #map {
      background: black;
    }

    .leaflet-container {
      background: black !important;
    }

    /* SIDEBAR */

    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 340px;
      height: calc(100vh - 20px);
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }

    #title {
      color: white;
      font-size: 24px;
      font-weight: bold;
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    #search {
      margin: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
    }

    #players {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .player {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      color: white;
      border: 1px solid rgba(255,255,255,0.03);
      transition: 0.2s;
    }

    .player:hover {
      background: rgba(255,255,255,0.08);
    }

    .offline {
      opacity: 0.4;
    }

    .name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .coords {
      font-size: 13px;
      color: #d0d0d0;
      margin-top: 4px;
    }

    .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      background: #e53935;
      color: white;
      font-size: 12px;
    }

    button:hover {
      opacity: 0.9;
    }

    #coords-box {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(15,15,15,0.95);
      color: white;
      padding: 12px;
      border-radius: 12px;
      z-index: 9999;
      border: 1px solid rgba(255,255,255,0.05);
    }

    #topbar {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    #topbar button {
      background: rgba(20,20,20,0.95);
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .leaflet-tooltip {
      background: transparent !important;
      border: none !important;
      color: white !important;
      font-weight: bold;
      text-shadow: 0 0 5px black;
      box-shadow: none !important;
    }

  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">

  <div id="title">
    FactionsVR Tracker
  </div>

  <input id="search" placeholder="Search players...">

  <div id="players"></div>

</div>

<div id="topbar">
  <button id="toggleHeat">Heat Map</button>
  <button id="resetView">Reset View</button>
</div>

<div id="coords-box">
  X: 0 | Z: 0
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -10,
  maxZoom: 12,
  zoomSnap: 0.25,
  zoomDelta: 0.25,
  wheelPxPerZoomLevel: 60,
  attributionControl: false
}).setView([0,0], 0);

map.scrollWheelZoom.enable();
map.doubleClickZoom.enable();
map.touchZoom.enable();
map.boxZoom.enable();
map.keyboard.enable();

const gridLayer = L.layerGroup().addTo(map);

function drawGrid() {

  gridLayer.clearLayers();

  const zoom = map.getZoom();

  let size = 100;

  if (zoom <= -2) size = 500;
  if (zoom <= -4) size = 1000;
  if (zoom <= -6) size = 2500;
  if (zoom <= -8) size = 5000;

  const bounds = map.getBounds();

  const minX = Math.floor(bounds.getWest() / size) * size;
  const maxX = Math.ceil(bounds.getEast() / size) * size;

  const minY = Math.floor(bounds.getSouth() / size) * size;
  const maxY = Math.ceil(bounds.getNorth() / size) * size;

  for (let x = minX; x <= maxX; x += size) {

    L.polyline([
      [minY, x],
      [maxY, x]
    ], {
      color: "rgba(255,255,255,0.12)",
      weight: 1,
      interactive: false
    }).addTo(gridLayer);
  }

  for (let y = minY; y <= maxY; y += size) {

    L.polyline([
      [y, minX],
      [y, maxX]
    ], {
      color: "rgba(255,255,255,0.12)",
      weight: 1,
      interactive: false
    }).addTo(gridLayer);
  }
}

map.on("move zoom", drawGrid);

drawGrid();

const markers = {};
const heatLayers = [];

let heatEnabled = false;

const knownPlayers =
  JSON.parse(localStorage.getItem("knownPlayers") || "{}");

function savePlayers() {

  localStorage.setItem(
    "knownPlayers",
    JSON.stringify(knownPlayers)
  );
}

function copy(text) {

  navigator.clipboard.writeText(text);
}

map.on("mousemove", e => {

  document.getElementById("coords-box").innerText =
    `X: ${Math.floor(e.latlng.lng)} | Z: ${Math.floor(-e.latlng.lat)}`;
});

function addHeat(lat, lng) {

  if (!heatEnabled) return;

  const heat = L.circleMarker([lat, lng], {
    radius: 24,
    color: "red",
    fillColor: "red",
    fillOpacity: 0.05,
    stroke: false
  }).addTo(map);

  heatLayers.push(heat);
}

function clearHeat() {

  heatLayers.forEach(h => map.removeLayer(h));

  heatLayers.length = 0;
}

document.getElementById("toggleHeat").onclick = () => {

  heatEnabled = !heatEnabled;

  if (heatEnabled) {

    Object.values(knownPlayers).forEach(p => {

      addHeat(p.lat, p.lng);
    });

  } else {

    clearHeat();
  }
};

document.getElementById("resetView").onclick = () => {

  map.setView([0,0], 0);
};

async function load() {

  try {

    const r =
      await fetch("https://factions-map.onrender.com/players");

    const data = await r.json();

    const online = {};

    data.players.forEach(p => {

      const x = Math.floor(p.Pose.Head.Position[0]);
      const y = Math.floor(p.Pose.Head.Position[1]);
      const z = Math.floor(p.Pose.Head.Position[2]);

      const lat = -z;
      const lng = x;

      online[p.Username] = true;

      if (!knownPlayers[p.Username]) {

        knownPlayers[p.Username] = {
          history: [],
          teleports: []
        };
      }

      const old = knownPlayers[p.Username];

      if (old.x !== undefined) {

        const dist = Math.hypot(x - old.x, z - old.z);

        if (dist > 1500) {

          old.teleports.push({
            x,
            z
          });

          if (old.teleports.length > 20) {
            old.teleports.shift();
          }

          const counts = {};

          old.teleports.forEach(t => {

            const tx =
              Math.round(t.x / 100) * 100;

            const tz =
              Math.round(t.z / 100) * 100;

            const key = tx + ":" + tz;

            counts[key] =
              (counts[key] || 0) + 1;
          });

          let best = null;
          let bestCount = 0;

          Object.entries(counts).forEach(([k,v]) => {

            if (v > bestCount) {

              best = k;
              bestCount = v;
            }
          });

          if (best) {

            const split = best.split(":");

            old.homeX = split[0];
            old.homeZ = split[1];
          }
        }
      }

      old.x = x;
      old.y = y;
      old.z = z;
      old.lat = lat;
      old.lng = lng;
      old.online = true;

      addHeat(lat, lng);

      if (!markers[p.Username]) {

        markers[p.Username] = L.circleMarker(
          [lat,lng],
          {
            radius: 6,
            color: "red",
            fillColor: "red",
            fillOpacity: 1
          }
        ).addTo(map);

        markers[p.Username].bindTooltip(
          p.Username,
          {
            permanent: true,
            direction: "top"
          }
        );

      } else {

        markers[p.Username].setLatLng([lat,lng]);
      }
    });

    Object.keys(knownPlayers).forEach(name => {

      if (!online[name]) {

        knownPlayers[name].online = false;
      }
    });

    renderPlayers();

    savePlayers();

  } catch(err) {

    console.log(err);
  }
}

function renderPlayers() {

  const wrap =
    document.getElementById("players");

  const search =
    document.getElementById("search")
    .value
    .toLowerCase();

  wrap.innerHTML = "";

  const sorted =
    Object.entries(knownPlayers)
    .sort((a,b)=>b[1].online-a[1].online);

  sorted.forEach(([name,p]) => {

    if (
      !name.toLowerCase().includes(search)
    ) return;

    let likelyHome = "Unknown";

    if (
      p.homeX !== undefined &&
      p.homeZ !== undefined
    ) {

      likelyHome =
        `X: ${p.homeX} | Z: ${p.homeZ}`;
    }

    const div =
      document.createElement("div");

    div.className = "player";

    if (!p.online)
      div.classList.add("offline");

    div.innerHTML = `
      <div class="name">
        ${name}
        ${p.online ? "🟢" : "⚫"}
      </div>

      <div class="coords">
        X: ${p.x}
      </div>

      <div class="coords">
        Y: ${p.y}
      </div>

      <div class="coords">
        Z: ${p.z}
      </div>

      <div class="coords" style="margin-top:8px;color:#ff7272;">
        🏠 Likely Home
      </div>

      <div class="coords">
        ${likelyHome}
      </div>

      <div class="buttons">
        <button class="tp">
          Copy TP
        </button>

        <button class="home">
          Copy Home
        </button>

        <button class="view">
          View
        </button>
      </div>
    `;

    div.querySelector(".tp").onclick = () => {

      copy(`${p.x} ${p.y} ${p.z}`);
    };

    div.querySelector(".home").onclick = () => {

      if (p.homeX !== undefined) {

        copy(`${p.homeX} ${p.homeZ}`);
      }
    };

    div.querySelector(".view").onclick = () => {

      map.setView([p.lat,p.lng], 4);
    };

    wrap.appendChild(div);
  });
}

document.getElementById("search").oninput =
  renderPlayers;

setInterval(load, 3000);

load();

</script>

</body>
</html>

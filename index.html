<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FactionsVR Player Tracker</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      display: flex;
    }

    /* SIDEBAR */
    #sidebar {
      width: 360px;
      height: 100vh;
      background: #0b0b0b;
      border-right: 1px solid #1f1f1f;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      padding: 16px;
      border-bottom: 1px solid #1f1f1f;
      background: #111;
    }

    #title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    #search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1a1a1a;
      color: white;
      box-sizing: border-box;
    }

    #stats {
      margin-top: 10px;
      color: #aaa;
      font-size: 14px;
    }

    /* PLAYER LIST */
    #players {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .player {
      background: #141414;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      transition: 0.15s;
    }

    .player:hover {
      background: #1b1b1b;
    }

    .player.online {
      border-left: 5px solid #00ff66;
    }

    .player.offline {
      border-left: 5px solid #ff4444;
      opacity: 0.7;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .coords {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .playtime {
      color: #999;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .home {
      color: #ffb347;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .offline-text {
      color: #ff6666;
      font-size: 13px;
      margin-top: 5px;
    }

    button {
      background: #222;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 6px;
    }

    button:hover {
      background: #333;
    }

    /* RIGHT SIDE */
    #main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    #center-text {
      text-align: center;
    }

    #big-count {
      font-size: 90px;
      font-weight: bold;
      color: white;
    }

    #sub {
      font-size: 24px;
      color: #888;
      margin-top: 10px;
    }

    #toast {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid #333;
      padding: 10px 16px;
      border-radius: 10px;
      opacity: 0;
      transition: 0.2s;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="sidebar">

  <div id="topbar">
    <div id="title">FactionsVR Tracker</div>

    <input id="search" placeholder="Search player...">

    <div id="stats">
      Online: <span id="online-count">0</span><br>
      Saved Players: <span id="saved-count">0</span>
    </div>
  </div>

  <div id="players"></div>

</div>

<div id="main">

  <div id="center-text">
    <div id="big-count">0</div>
    <div id="sub">PLAYERS ONLINE</div>
  </div>

  <div id="toast">Copied</div>

</div>

<script>

const API = "https://factions-map.onrender.com/api/players";

const playersDiv = document.getElementById("players");

let history = JSON.parse(localStorage.getItem("history") || "{}");
let offline = JSON.parse(localStorage.getItem("offlinePlayers") || "{}");

function save(){
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("offlinePlayers", JSON.stringify(offline));
}

function toast(text){
  const t = document.getElementById("toast");
  t.innerText = text;
  t.style.opacity = 1;

  setTimeout(()=>{
    t.style.opacity = 0;
  },1200);
}

function copy(text){
  navigator.clipboard.writeText(text);
  toast("Copied");
}

function likelyHome(hist){

  if(!hist || hist.length < 2) return null;

  const teleports = {};

  for(let i=1;i<hist.length;i++){

    const a = hist[i-1];
    const b = hist[i];

    const dist = Math.hypot(b.x-a.x,b.z-a.z);

    // TP DETECT
    if(dist > 2000){

      const gx = Math.round(b.x / 50) * 50;
      const gz = Math.round(b.z / 50) * 50;

      const key = gx + ":" + gz;

      teleports[key] = (teleports[key] || 0) + 1;
    }
  }

  let best = null;
  let bestCount = 0;

  for(const k in teleports){

    if(teleports[k] > bestCount){
      best = k;
      bestCount = teleports[k];
    }
  }

  if(!best) return null;

  const [x,z] = best.split(":").map(Number);

  return {x,z,count:bestCount};
}

async function load(){

  try {

    const r = await fetch(API);
    const d = await r.json();

    const onlineNow = {};

    playersDiv.innerHTML = "";

    document.getElementById("big-count").innerText = d.players.length;
    document.getElementById("online-count").innerText = d.players.length;

    // ONLINE PLAYERS
    d.players.forEach(p=>{

      const name = p.Username;

      const [x,y,z] = p.Pose.Head.Position;

      onlineNow[name] = true;

      if(!history[name]) history[name] = [];

      history[name].push({
        x: Math.floor(x),
        y: Math.floor(y),
        z: Math.floor(z),
        time: Date.now()
      });

      if(history[name].length > 500){
        history[name].shift();
      }

      offline[name] = {
        lastSeen: Date.now(),
        x: Math.floor(x),
        y: Math.floor(y),
        z: Math.floor(z),
        playtime: p.PlayTime
      };

      const home = likelyHome(history[name]);

      const div = document.createElement("div");
      div.className = "player online";

      div.innerHTML = `
        <div class="name">${name}</div>

        <div class="coords">
          X: ${Math.floor(x)}<br>
          Y: ${Math.floor(y)}<br>
          Z: ${Math.floor(z)}
        </div>

        <div class="playtime">
          PlayTime: ${p.PlayTime}
        </div>

        <div class="home">
          ${
            home
            ? `Likely Base:
               X:${home.x}
               Z:${home.z}
               (${home.count} teleports)`
            : `Likely Base: Unknown`
          }
        </div>

        <button onclick="copy('X:${Math.floor(x)} Y:${Math.floor(y)} Z:${Math.floor(z)}')">
          Copy Coords
        </button>

        ${
          home
          ? `
          <button onclick="copy('X:${home.x} Z:${home.z}')">
            Copy Base
          </button>
          `
          : ""
        }
      `;

      playersDiv.appendChild(div);
    });

    // OFFLINE PLAYERS
    for(const name in offline){

      if(onlineNow[name]) continue;

      const p = offline[name];

      const mins = Math.floor((Date.now()-p.lastSeen)/60000);

      const div = document.createElement("div");
      div.className = "player offline";

      div.innerHTML = `
        <div class="name">${name}</div>

        <div class="coords">
          Last Coords:<br>
          X: ${p.x}<br>
          Y: ${p.y}<br>
          Z: ${p.z}
        </div>

        <div class="playtime">
          Last PlayTime: ${p.playtime || "Unknown"}
        </div>

        <div class="offline-text">
          Offline for ${mins}m
        </div>

        <button onclick="copy('X:${p.x} Y:${p.y} Z:${p.z}')">
          Copy Last Coords
        </button>
      `;

      playersDiv.appendChild(div);
    }

    document.getElementById("saved-count").innerText =
      Object.keys(offline).length;

    save();

    filterPlayers();

  } catch(err){

    console.log(err);

    document.getElementById("sub").innerText =
      "SERVER OFFLINE";
  }
}

function filterPlayers(){

  const q = document.getElementById("search")
    .value
    .toLowerCase();

  document.querySelectorAll(".player").forEach(p=>{

    const txt = p.innerText.toLowerCase();

    p.style.display = txt.includes(q)
      ? "block"
      : "none";
  });
}

document.getElementById("search")
  .addEventListener("input", filterPlayers);

load();
setInterval(load, 5000);

</script>

</body>
</html>
